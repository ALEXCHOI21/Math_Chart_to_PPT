<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChoiGPT | Math Graph to PPT Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 25px var(--primary-glow);
        }

        .image-preview {
            width: 100%;
            height: 200px;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s;
        }

        .card:hover .image-preview img {
            transform: scale(1.05);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background: rgba(14, 165, 233, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            min-height: 3rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            padding: 0.9rem 1.5rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: var(--accent);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        footer {
            margin-top: 6rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
        }

        .badge {
            background: rgba(14, 165, 233, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
    </style>
</head>
<body>

<header>
    <div class="badge">ChoiGPT Exclusive Service</div>
    <h1>Math Graph Engine</h1>
    <p class="subtitle">이미지 분석부터 PPT 변환까지, 에이전트가 직접 완료한 결과물입니다.</p>
</header>

<div class="container">
    <!-- Result Card 1 -->
    <div class="card">
        <div class="image-preview">
            <img src="이미지/1.jpg" alt="Graph 1 Original">
        </div>
        <div class="card-header">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="card-title">변환 결과물 #1</div>
        </div>
        <p class="card-desc">축과 기본 함수 곡선을 완벽하게 객체화했습니다.</p>
        <a href="output/1.pptx" class="btn">PPT 다운로드</a>
    </div>

    <!-- Result Card 2 -->
    <div class="card">
        <div class="image-preview">
            <img src="이미지/2.jpg" alt="Graph 2 Original">
        </div>
        <div class="card-header">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="card-title">변환 결과물 #2</div>
        </div>
        <p class="card-desc">복합적인 곡선 궤적을 정밀 분석하여 변환 완료했습니다.</p>
        <a href="output/2.pptx" class="btn">PPT 다운로드</a>
    </div>

    <!-- Result Card 3 -->
    <div class="card">
        <div class="image-preview">
            <img src="이미지/3.jpg" alt="Graph 3 Original">
        </div>
        <div class="card-header">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="card-title">변환 결과물 #3</div>
        </div>
        <p class="card-desc">격자 무늬와 복수 라벨을 포함한 고난도 변환 건입니다.</p>
        <a href="output/3.pptx" class="btn">PPT 다운로드</a>
    </div>
</div>

<footer>
    <p>© 2026 ChoiGPT Corp. All Rights Reserved.</p>
</footer>

</body>
</html>
