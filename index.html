<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChoiGPT | Math Graph Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #0ea5e9;
            --secondary: #8b5cf6;
            --primary-glow: rgba(14, 165, 233, 0.3);
            --secondary-glow: rgba(139, 92, 246, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .preview-box {
            width: 100%;
            height: 220px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-copy {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-copy:hover {
            box-shadow: 0 0 20px var(--secondary-glow);
            transform: scale(1.02);
        }

        .btn-download {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-download:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-ppt {
            grid-column: span 2;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .btn-ppt:hover {
            background: #334155;
            color: white;
        }

        footer {
            margin-top: 6rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 2rem;
            background: var(--secondary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transform: translateY(200%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #toast.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<header>
    <h1>Math Graph Engine</h1>
    <p class="subtitle">그래프 분석 결과물 - PNG 다운로드 및 클립보드 복사 기능을 제공합니다.</p>
</header>

<div class="container">
    <!-- Card 1 -->
    <div class="card">
        <div class="preview-box">
            <img id="img1" src="이미지/1.jpg" alt="Graph 1">
        </div>
        <div class="action-group">
            <button class="btn btn-copy" onclick="copyToClipboard('이미지/1.jpg')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                클립보드 복사
            </button>
            <a href="이미지/1.jpg" download="graph_1.png" class="btn btn-download">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                PNG 다운로드
            </a>
            <a href="output/1.pptx" class="btn btn-ppt">
                PPT 변환본 내려받기
            </a>
        </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
        <div class="preview-box">
            <img id="img2" src="이미지/2.jpg" alt="Graph 2">
        </div>
        <div class="action-group">
            <button class="btn btn-copy" onclick="copyToClipboard('이미지/2.jpg')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                클립보드 복사
            </button>
            <a href="이미지/2.jpg" download="graph_2.png" class="btn btn-download">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                PNG 다운로드
            </a>
            <a href="output/2.pptx" class="btn btn-ppt">
                PPT 변환본 내려받기
            </a>
        </div>
    </div>

    <!-- Card 3 -->
    <div class="card">
        <div class="preview-box">
            <img id="img3" src="이미지/3.jpg" alt="Graph 3">
        </div>
        <div class="action-group">
            <button class="btn btn-copy" onclick="copyToClipboard('이미지/3.jpg')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                클립보드 복사
            </button>
            <a href="이미지/3.jpg" download="graph_3.png" class="btn btn-download">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                PNG 다운로드
            </a>
            <a href="output/3.pptx" class="btn btn-ppt">
                PPT 변환본 내려받기
            </a>
        </div>
    </div>
</div>

<div id="toast">클립보드에 이미지가 복사되었습니다!</div>

<footer>
    <p>© 2026 ChoiGPT Corp. All Rights Reserved.</p>
</footer>

<script>
    async function copyToClipboard(imgUrl) {
        try {
            const response = await fetch(imgUrl);
            const blob = await response.blob();
            await navigator.clipboard.write([
                new ClipboardItem({
                    [blob.type]: blob
                })
            ]);
            showToast();
        } catch (err) {
            console.error('복사 실패:', err);
            alert('이미지 복사 기능을 지원하지 않는 브라우저이거나 오류가 발생했습니다.');
        }
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }
</script>

</body>
</html>
