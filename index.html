<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChoiGPT | Math Graph to PPT Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-indigo: #6366f1;
            --accent-purple: #a855f7;
        }
        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, .font-outfit { font-family: 'Outfit', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-grid {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
            background-color: #0f172a;
        }
        .preview-container {
            position: relative;
            background: #000000; /* 흰색 그래프를 위한 완전 블랙 배경 */
            border: 2px solid rgba(255, 255, 255, 0.05);
        }
        .btn-hover-effect {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover-effect:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.5);
        }
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #6366f1;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-grid min-h-screen">
    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-microchip text-white text-xl"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter font-outfit bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">ChoiGPT Corp.</span>
            </div>
            <div class="hidden md:flex items-center gap-6">
                <span class="text-sm font-semibold text-indigo-400 flex items-center gap-2 bg-indigo-500/10 px-4 py-2 rounded-full border border-indigo-500/20">
                    <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span> B2B Strategy Engine
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Hero Section -->
        <div class="text-center mb-16">
            <h2 class="text-5xl md:text-7xl font-black mb-6 font-outfit tracking-tight">Math Chart <span class="text-indigo-500">Auto-Render</span></h2>
            <p class="text-xl text-gray-400 max-w-2xl mx-auto font-medium">분석된 데이터를 기반으로 투명 배경의 깔끔한 그래프를 직접 생성했습니다. 즉시 다운로드하거나 클립보드에 복사하세요.</p>
            <!-- 마지막 업데이트 시각 배지 -->
            <div class="mt-6 flex justify-center">
                <span id="update-badge" class="inline-flex items-center gap-2 text-xs font-mono bg-white/5 border border-white/10 text-gray-400 px-5 py-2.5 rounded-full">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                    <span id="update-badge-text">데이터 확인 중...</span>
                </span>
            </div>
        </div>

        <!-- Dynamic Content Grid -->
        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cards will be injected here by JavaScript -->
            <div class="col-span-full flex flex-col items-center py-20 opacity-50">
                <i class="fas fa-circle-notch animate-spin text-4xl mb-4"></i>
                <p>결과 데이터를 불러오는 중...</p>
            </div>
        </div>
        
        <div class="mt-20 text-center py-6 border-t border-white/5 opacity-40">
            <p id="footer-update-text" class="text-xs font-mono uppercase tracking-widest">Last Engine Update: --</p>
        </div>
    </main>

    <footer class="py-12 border-b border-white/5 text-center text-gray-500">
        <p class="text-sm font-semibold tracking-widest uppercase">© 2026 ChoiGPT Corp. All Rights Reserved.</p>
    </footer>

    <div id="toast" class="toast">클립보드에 복사되었습니다!</div>

    <script>
        // Load data and render cards
        async function loadResults() {
            const grid = document.getElementById('results-grid');
            const ts = Date.now();
            try {
                const response = await fetch('output/data.json?t=' + ts);
                const data = await response.json();
                
                if (data.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-500">생성된 결과물이 없습니다.</p>';
                    return;
                }

                grid.innerHTML = data.map((item, index) => `
                    <section class="glass-panel rounded-3xl p-6 hover:border-indigo-500/30 transition-all group">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-gray-300">Graph ${item.id}</h4>
                            <span class="text-[10px] bg-indigo-500/20 text-indigo-400 px-2 py-1 rounded-md uppercase font-bold tracking-tighter">White Theme</span>
                        </div>
                        <div class="preview-container rounded-2xl p-4 flex items-center justify-center mb-6 h-56 overflow-hidden bg-black">
                            <img src="${item.png}?t=${ts}" alt="${item.id}" class="max-w-full h-full object-contain drop-shadow-xl group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <div class="flex gap-3">
                            <button onclick="copyToClipboard('${item.png}?t=${ts}')" class="flex-1 bg-white/5 hover:bg-white/10 py-3 rounded-xl border border-white/10 text-xs font-bold transition-all">COPY</button>
                            <a href="${item.png}?t=${ts}" download class="flex-1 text-center bg-white/5 hover:bg-white/10 py-3 rounded-xl border border-white/10 text-xs font-bold transition-all flex items-center justify-center gap-2">PNG</a>
                            <a href="${item.pptx}?t=${ts}" download class="flex-1 text-center bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 py-3 rounded-xl border border-indigo-500/20 text-xs font-bold transition-all flex items-center justify-center gap-2">PPTX</a>
                        </div>
                    </section>
                `).join('');

                // ── 마지막 업데이트 시각 표시 ──────────────────────────────
                // data.json의 Last-Modified 헤더 또는 현재 시각 기반
                let updateText = 'Last Engine Update: --';
                try {
                    const checkRes = await fetch('output/data.json?t=' + ts, { method: 'HEAD' });
                    const lastMod = checkRes.headers.get('Last-Modified');
                    if (lastMod) {
                        const d = new Date(lastMod);
                        // KST = UTC+9
                        const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
                        const pad = n => String(n).padStart(2, '0');
                        updateText = `Last Engine Update: ${kst.getUTCFullYear()}-${pad(kst.getUTCMonth()+1)}-${pad(kst.getUTCDate())} ${pad(kst.getUTCHours())}:${pad(kst.getUTCMinutes())} (KST)`;
                    } else {
                        // 헤더 없을 때 GitHub Pages에서 사이트 배포 시각 기반
                        const now = new Date();
                        const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
                        const pad = n => String(n).padStart(2, '0');
                        updateText = `Last Engine Update: ${kst.getUTCFullYear()}-${pad(kst.getUTCMonth()+1)}-${pad(kst.getUTCDate())} ${pad(kst.getUTCHours())}:${pad(kst.getUTCMinutes())} (KST)`;
                    }
                } catch (e) {
                    // fallback: 현재 시각
                    const now = new Date();
                    const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
                    const pad = n => String(n).padStart(2, '0');
                    updateText = `Last Engine Update: ${kst.getUTCFullYear()}-${pad(kst.getUTCMonth()+1)}-${pad(kst.getUTCDate())} ${pad(kst.getUTCHours())}:${pad(kst.getUTCMinutes())} (KST)`;
                }
                const badgeEl = document.getElementById('update-badge-text');
                const footerEl = document.getElementById('footer-update-text');
                if (badgeEl) badgeEl.textContent = updateText;
                if (footerEl) footerEl.textContent = updateText;
            } catch (err) {
                console.error('Error loading data:', err);
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-red-400">데이터를 불러오는 데 실패했습니다. (output/data.json 확인 필요)</p>';
            }
        }

        async function copyToClipboard(imgPath) {
            try {
                const response = await fetch(imgPath);
                const blob = await response.blob();
                const item = new ClipboardItem({ "image/png": blob });
                await navigator.clipboard.write([item]);
                
                const toast = document.getElementById("toast");
                toast.className = "toast show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
            } catch (err) {
                console.error('Failed to copy: ', err);
                alert('복사 중 오류가 발생했습니다.');
            }
        }

        window.onload = loadResults;
    </script>
</body>
</html>
</body>
</html>
